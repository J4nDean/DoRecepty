spring.application.name=backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dorecepty}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dorecepty_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dorecepty_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

app.jwt.secret=${JWT_SECRET:dG9wU2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb24hMjAyNA==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
